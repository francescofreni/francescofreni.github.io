<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teaching | Francesco Freni</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌋</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script>
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>
<body>
    <header>
        <div>
            <a href="index.html"><strong>Francesco</strong> Freni</a>
        </div>
        <nav>
            <a href="index.html">About</a>
            <a href="research.html">Research</a>
            <a href="teaching.html" class="active">Teaching</a>
            <button id="theme-toggle" aria-label="Toggle Dark Mode"></button>
        </nav>
    </header>

    <main>
        <section>
            <h2>TA @ <a href="https://www.ku.dk/en">University of Copenhagen</a> </h2>
            <ul>
                <li>
                    <strong>Statistics B</strong> (Block 3 — 2025/2026)<br>
                </li>
            </ul>
        </section>

        <hr class="separator">

        <section>
            <h2>TA @ <a href="https://ethz.ch/en.html">ETH Zurich</a> </h2>
            <ul>
                <li>
                    <strong>Introduction to Machine Learning</strong> (Spring 2025)<br>
                </li>
            </ul>
        </section>

        <hr class="separator">

        <section>
            <h2>TA @  <a href="https://www.unipd.it/en/">University of Padova</a> </h2>
            <ul>
                <li>
                    <strong>Probability Theory</strong> (Spring 2023)<br>
                </li>
            </ul>
        </section>

    </main>

    <footer>
        <hr class="separator">
        <p>&copy; 2026 Francesco Freni. All rights reserved.</p>
    </footer>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const root = document.documentElement;
        const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" /></svg>`;
        const moonIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" fill-rule="evenodd" d="M21 15.6A8.9 8.9 0 1 1 12.4 3 a7.1 7.1 0 0 0 8.6 12.6z"/></svg>`;
        toggleBtn.innerHTML = root.getAttribute('data-theme') === 'dark' ? sunIcon : moonIcon;
        toggleBtn.addEventListener('click', () => {
            const isDark = root.getAttribute('data-theme') === 'dark';
            if (isDark) {
                root.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                toggleBtn.innerHTML = moonIcon;
            } else {
                root.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                toggleBtn.innerHTML = sunIcon;
            }
        });
    </script>
</body>
</html>
